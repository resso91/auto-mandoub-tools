<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Mandoub - Official Quote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans Arabic', sans-serif; }
        .pdf-page { width: 800px; min-height: 1120px; padding: 60px; background: white; margin: 0 auto; position: relative; }
        @media print { .no-print { display: none; } }
        
        /* Relocated Stamp: Now sits near the final total summary */
        .official-stamp {
            border: 5px double #1e40af; border-radius: 50%; color: #1e40af; width: 120px; height: 120px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 900; opacity: 0.4; transform: rotate(-15deg); 
            position: absolute; bottom: 180px; left: 80px; 
            z-index: 50; background: rgba(255, 255, 255, 0.8); pointer-events: none;
        }
        .en-mode { direction: ltr !important; text-align: left !important; }
        .en-mode .official-stamp { left: auto; right: 80px; }
    </style>
</head>
<body class="bg-slate-200 lg:p-10 p-2">

    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8">
        <div class="lg:w-1/3 bg-white p-6 rounded-3xl shadow-xl no-print h-fit sticky top-10 border-t-8 border-blue-600">
            <h2 class="text-xl font-black mb-6 border-b pb-2">Control Panel</h2>
            <div class="space-y-4">
                <div class="flex gap-2 p-1 bg-slate-100 rounded-xl">
                    <button onclick="setLang('ar')" class="flex-1 py-2 bg-blue-600 text-white rounded-lg font-bold">عربي</button>
                    <button onclick="setLang('en')" class="flex-1 py-2 bg-slate-400 text-white rounded-lg font-bold">English</button>
                </div>
                <input type="text" id="in_name" oninput="update()" placeholder="Client Name" class="w-full border p-3 rounded-xl outline-none">
                <input type="text" id="in_car" oninput="update()" placeholder="Car Model & Year" class="w-full border p-3 rounded-xl outline-none">
                <input type="text" id="in_iban" oninput="update()" placeholder="Enter IBAN Manually" class="w-full border p-3 rounded-xl outline-none text-left">
                
                <div id="items_inputs" class="space-y-4 mt-4">
                    <div class="p-4 border rounded-2xl bg-slate-50 space-y-2 item-row">
                        <input type="text" placeholder="Part Description" class="w-full border p-2 rounded-lg text-sm in-part" oninput="update()">
                        <div class="flex gap-2">
                            <input type="number" placeholder="Price" class="w-1/2 border p-2 rounded-lg text-sm in-price" oninput="update()">
                            <input type="number" placeholder="Qty" class="w-1/2 border p-2 rounded-lg text-sm in-qty" value="1" oninput="update()">
                        </div>
                        <textarea placeholder="Condition notes..." class="w-full border p-2 rounded-lg text-xs in-notes" oninput="update()"></textarea>
                    </div>
                </div>
                <button onclick="addRow()" class="w-full py-2 text-blue-600 font-bold border-2 border-dashed border-blue-100 rounded-xl">+ Add Another Part</button>
                <input type="file" id="in_images" multiple accept="image/*" onchange="previewImages(event)" class="w-full text-xs mt-4">
